# 网站的基本信息
site:
  tab: Glacio
  title: Glacio
  description: Glacio is a polished Astro blog template for personal sites, notes, and portfolios.
  language: en
  favicon: /template-mark.svg
  theme:
    light: frostilight
    dark: frostinight
    code: github-dark
  date_format: ddd MMM DD YYYY
  blog:
    pageSize: 8
  menu:
    - id: home
      text: Home
      href: /
      svg: "material-symbols:home-outline-rounded"
      target: _self
    - id: about
      text: About
      href: /about
      svg: "material-symbols:info-outline-rounded"
      target: _self
    - id: blog
      text: Blogs
      href: /blog
      svg: "material-symbols:book-2-outline-rounded"
      target: _self
      subItems:
        - id: all
          text: All blogs
          href: /blog
          svg: "material-symbols:ink-pen-outline-rounded"
          target: _self
        - id: guides
          text: Guides
          href: /blog/category/guides
          svg: "material-symbols:unknown-document-outline-rounded"
          target: _self
        - id: notes
          text: Notes
          href: /blog/category/notes
          svg: "material-symbols:menu-book-outline-rounded"
          target: _self
    - id: project
      text: Project
      href: /project
      svg: "material-symbols:code-blocks-outline"
      target: _self
    - id: friend
      text: Friend
      href: /friend
      svg: "material-symbols:supervisor-account-outline-rounded"
      target: _self
    - id: contact
      text: Contact
      href: "mailto:hello@example.com"
      target: _blank
      svg: "material-symbols:attach-email-outline-rounded"

user:
  name: Glacio User
  site: "https://example.com/"
  avatar: /template-avatar.svg
  sidebar:
    social:
      - href: "https://github.com/example"
        ariaLabel: Github
        title: Github
        svg: "ri:github-line"
      - href: "https://x.com/example"
        ariaLabel: X
        title: X
        svg: "ri:twitter-x-line"
  footer:
    social:
      - href: "https://github.com/example"
        ariaLabel: Github
        title: Github
        svg: "ri:github-line"
      - href: "https://x.com/example"
        ariaLabel: X
        title: X
        svg: "ri:twitter-x-line"
